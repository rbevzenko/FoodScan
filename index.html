<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FoodScan — Calorie Analyzer</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodScan" />
    <meta name="description" content="AI-powered food & calorie analyzer" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, #f0fdf4 25%, #dcfce7 50%, #f0fdf4 75%);
        background-size: 800px 100%;
        animation: shimmer 1.4s infinite;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-green-50 via-white to-emerald-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      /* ── Auth ─────────────────────────────────────────────────────── */
      const USERS = [
        { id: 1, label: 'User 1', password: 'green-bowl-4812'   },
        { id: 2, label: 'User 2', password: 'calorie-scan-7703' },
        { id: 3, label: 'User 3', password: 'fresh-start-2259'  },
        { id: 4, label: 'User 4', password: 'macro-track-9147'  },
        { id: 5, label: 'User 5', password: 'daily-feast-6380'  },
      ];
      const AUTH_KEY = 'foodscan_auth';

      function loadAuth() {
        try { const raw = localStorage.getItem(AUTH_KEY); if (raw) return JSON.parse(raw); } catch {}
        return null;
      }
      function saveAuth(user) { localStorage.setItem(AUTH_KEY, JSON.stringify(user)); }
      function clearAuth() { localStorage.removeItem(AUTH_KEY); }

      /* ── LoginScreen ──────────────────────────────────────────────── */
      function LoginScreen({ onLogin }) {
        const [pw, setPw]     = useState('');
        const [err, setErr]   = useState('');
        const [show, setShow] = useState(false);

        function handleSubmit(e) {
          e.preventDefault();
          const found = USERS.find(u => u.password === pw.trim());
          if (found) { onLogin(found); }
          else { setErr('Неверный пароль. Попробуй снова.'); setPw(''); }
        }

        return (
          <div className="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-green-50 via-white to-emerald-50">
            <div className="w-full max-w-sm">
              <div className="text-center mb-8">
                <div className="text-5xl mb-3">🥗</div>
                <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">FoodScan</h1>
                <p className="text-gray-400 mt-1 text-sm">Введи пароль для входа в личный кабинет</p>
              </div>
              <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-sm border border-green-100 p-6 space-y-4">
                <div>
                  <label className="block text-sm font-semibold text-gray-600 mb-1.5">Пароль</label>
                  <div className="relative">
                    <input
                      type={show ? 'text' : 'password'}
                      value={pw}
                      onChange={e => { setPw(e.target.value); setErr(''); }}
                      placeholder="Введи пароль..."
                      autoComplete="current-password"
                      className="w-full border border-gray-200 rounded-xl px-4 py-3 pr-12 text-sm outline-none focus:border-green-400 transition-colors"
                    />
                    <button type="button" onClick={() => setShow(v => !v)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">
                      {show ? '🙈' : '👁️'}
                    </button>
                  </div>
                  {err && <p className="text-red-500 text-xs mt-1.5">{err}</p>}
                </div>
                <button type="submit" disabled={!pw.trim()}
                  className="w-full py-3 rounded-xl bg-green-500 hover:bg-green-600 disabled:bg-green-200 text-white font-semibold text-sm transition-colors">
                  Войти
                </button>
              </form>
            </div>
          </div>
        );
      }

      async function resizeImage(file, maxPx = 1024, quality = 0.8) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(url);
            const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width  = Math.round(img.width  * scale);
            canvas.height = Math.round(img.height * scale);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
          };
          img.onerror = reject;
          img.src = url;
        });
      }

      async function analyzeImage(file) {
        const base64 = await resizeImage(file);

        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ image_base64: base64, media_type: file.type || 'image/jpeg' }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      async function clarifyResult(currentResult, clarification) {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ clarification, currentResult }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      async function getDailyAdvice(meals) {
        const res = await fetch('/api/daily-advice', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ meals }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      async function recalculateFromIngredients(items, dish) {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ ingredients: items, dish }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      /* ── Daily log helpers ────────────────────────────────────────── */
      const DAILY_GOAL = 1500;
      const STORAGE_KEY = 'foodscan_daily_log';

      function todayStr() { return new Date().toISOString().slice(0, 10); }

      function loadDailyLog() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) { const p = JSON.parse(raw); if (p.date === todayStr()) return p; }
        } catch {}
        return { date: todayStr(), meals: [] };
      }

      function saveDailyLog(log) { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); }

      /* ── DailyAdviceCard ──────────────────────────────────────────── */
      function DailyAdviceCard({ advice, onClose }) {
        const statusStyle = {
          excellent: { bg: 'bg-green-50', border: 'border-green-200', badge: 'bg-green-100 text-green-700', label: 'Отлично!' },
          good:      { bg: 'bg-blue-50',  border: 'border-blue-200',  badge: 'bg-blue-100 text-blue-700',   label: 'Хорошо' },
          warning:   { bg: 'bg-yellow-50',border: 'border-yellow-200',badge: 'bg-yellow-100 text-yellow-700',label: 'Внимание' },
          danger:    { bg: 'bg-red-50',   border: 'border-red-200',   badge: 'bg-red-100 text-red-700',     label: 'Стоп!' },
        }[advice.status] ?? { bg: 'bg-gray-50', border: 'border-gray-200', badge: 'bg-gray-100 text-gray-700', label: '' };

        const scoreColor = advice.score >= 80 ? 'text-green-600' : advice.score >= 60 ? 'text-blue-600' : advice.score >= 40 ? 'text-yellow-600' : 'text-red-600';

        return (
          <div className={`w-full max-w-md mx-auto mb-6 rounded-2xl shadow-sm border ${statusStyle.border} ${statusStyle.bg} p-5 space-y-4`}>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-xl">🤖</span>
                <span className="font-bold text-gray-800 text-sm">Анализ дня от ИИ</span>
              </div>
              <div className="flex items-center gap-2">
                <span className={`text-2xl font-extrabold leading-none ${scoreColor}`}>{advice.score}</span>
                <span className="text-xs text-gray-400">/100</span>
                <span className={`ml-1 px-2 py-0.5 rounded-full text-xs font-semibold ${statusStyle.badge}`}>{statusStyle.label}</span>
              </div>
            </div>

            <p className="text-sm text-gray-700 leading-relaxed">{advice.summary}</p>

            <div className="bg-white bg-opacity-60 rounded-xl p-3">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Калории</p>
              <p className="text-sm text-gray-700">{advice.calories_comment}</p>
            </div>

            {advice.advice && advice.advice.length > 0 && (
              <div>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Рекомендации</p>
                <ul className="space-y-2">
                  {advice.advice.map((tip, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                      <span className="text-green-500 shrink-0 mt-0.5">✓</span>
                      <span>{tip}</span>
                    </li>
                  ))}
                </ul>
              </div>
            )}

            {advice.tomorrow_tip && (
              <div className="bg-white bg-opacity-60 rounded-xl p-3 flex gap-2">
                <span className="text-lg shrink-0">🌅</span>
                <div>
                  <p className="text-xs font-semibold text-gray-500 mb-0.5">На завтра</p>
                  <p className="text-sm text-gray-700">{advice.tomorrow_tip}</p>
                </div>
              </div>
            )}

            <button onClick={onClose} className="w-full py-2 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-gray-500 text-xs font-semibold transition-colors">
              Скрыть анализ
            </button>
          </div>
        );
      }

      /* ── DailyCounter ─────────────────────────────────────────────── */
      function DailyCounter({ log, onClear, onAnalyze, analyzing }) {
        const total = log.meals.reduce((sum, m) => sum + m.calories, 0);
        const pct = Math.min(100, (total / DAILY_GOAL) * 100);
        const over = total > DAILY_GOAL;
        return (
          <div className="w-full max-w-md mx-auto mb-6 bg-white rounded-2xl shadow-sm border border-green-100 p-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm font-semibold text-gray-600">Today's calories</span>
              <button onClick={onClear} className="text-xs text-gray-500 underline hover:text-red-500 transition-colors">Reset day</button>
            </div>
            <div className="flex items-end gap-1 mb-2">
              <span className={`text-3xl font-extrabold leading-none ${over ? 'text-red-500' : 'text-green-600'}`}>{total}</span>
              <span className="text-gray-400 text-sm mb-0.5">/ {DAILY_GOAL} kcal</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2 mb-3">
              <div className={`h-2 rounded-full transition-all duration-700 ${over ? 'bg-red-400' : 'bg-green-400'}`} style={{ width: `${pct}%` }} />
            </div>
            {log.meals.length > 0 ? (
              <ul className="space-y-1 mb-3">
                {log.meals.map((m) => (
                  <li key={m.id} className="flex justify-between text-xs text-gray-500">
                    <span className="truncate mr-2">{m.dish}</span>
                    <span className="shrink-0 font-medium text-gray-700">{m.calories} kcal · {m.time}</span>
                  </li>
                ))}
              </ul>
            ) : (
              <p className="text-xs text-gray-400 text-center mb-3">No meals logged yet today</p>
            )}
            <button
              onClick={onAnalyze}
              disabled={analyzing || log.meals.length === 0}
              className="w-full py-2.5 rounded-xl bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 disabled:from-green-200 disabled:to-green-200 text-white font-semibold text-sm transition-all flex items-center justify-center gap-2"
            >
              {analyzing ? (
                <><span className="animate-spin">⏳</span> ИИ анализирует…</>
              ) : (
                <><span>🤖</span> Анализ дня от ИИ</>
              )}
            </button>
          </div>
        );
      }

      /* ── Skeleton ─────────────────────────────────────────────────── */
      function Skeleton() {
        return (
          <div className="space-y-3 w-full">
            {[['2/3 mx-auto h-6'],['full h-4'],['5/6 h-4'],['4/6 h-4'],['full h-3'],['full h-3'],['full h-3'],['full h-10']].map(([cls], i) => (
              <div key={i} className={`shimmer rounded-xl w-${cls}`} />
            ))}
          </div>
        );
      }

      function ConfidenceBadge({ level }) {
        const style = { low: 'bg-red-100 text-red-700', medium: 'bg-yellow-100 text-yellow-700', high: 'bg-green-100 text-green-700' }[level] ?? 'bg-gray-100 text-gray-600';
        return <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide ${style}`}>{level} confidence</span>;
      }

      function MacroBar({ label, value, total, color }) {
        const pct = total > 0 ? Math.min(100, (value / total) * 100) : 0;
        return (
          <div>
            <div className="flex justify-between text-sm mb-1">
              <span className="font-medium text-gray-500">{label}</span>
              <span className="font-semibold text-gray-800">{value}g</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2.5">
              <div className={`${color} h-2.5 rounded-full transition-all duration-700`} style={{ width: `${pct}%` }} />
            </div>
          </div>
        );
      }

      /* ── ResultCard ───────────────────────────────────────────────── */
      function ResultCard({ result, imageUrl, onReset, onRecalculate, onAddToLog, onClarify }) {
        const total = result.macros.protein + result.macros.carbs + result.macros.fat;
        const [adjusting, setAdjusting] = useState(false);
        const [editItems, setEditItems] = useState(result.items);
        const [newName, setNewName] = useState('');
        const [newAmount, setNewAmount] = useState('');
        const [recalcLoading, setRecalcLoading] = useState(false);
        const [clarifyText, setClarifyText] = useState('');
        const [clarifyLoading, setClarifyLoading] = useState(false);

        useEffect(() => { setEditItems(result.items); setAdjusting(false); setClarifyText(''); }, [result]);

        function updateItem(i, field, value) {
          setEditItems((prev) => prev.map((item, idx) => idx === i ? { ...item, [field]: value } : item));
        }
        function removeItem(i) { setEditItems((prev) => prev.filter((_, idx) => idx !== i)); }
        function addItem() {
          if (!newName.trim()) return;
          setEditItems((prev) => [...prev, { name: newName.trim(), amount: newAmount.trim() || '1 serving', calories: 0 }]);
          setNewName(''); setNewAmount('');
        }
        async function handleRecalc() {
          setRecalcLoading(true);
          try { await onRecalculate(editItems, result.dish); }
          finally { setRecalcLoading(false); }
        }
        async function handleClarify() {
          if (!clarifyText.trim()) return;
          setClarifyLoading(true);
          try { await onClarify(result, clarifyText.trim()); }
          finally { setClarifyLoading(false); }
        }

        return (
          <div className="w-full max-w-md mx-auto space-y-4 pb-10">
            <div className="rounded-2xl overflow-hidden shadow-md">
              <img src={imageUrl} alt="food" className="w-full object-cover max-h-56" />
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-green-100 p-5 space-y-4">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <h2 className="text-xl font-bold text-gray-800">{result.dish}</h2>
                  <div className="mt-1"><ConfidenceBadge level={result.confidence} /></div>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-4xl font-extrabold text-green-600 leading-none">{result.totalCalories}</div>
                  <div className="text-xs text-gray-400 mt-0.5">kcal</div>
                </div>
              </div>
              <hr className="border-green-50" />
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest">Ingredients</p>
                  <button onClick={() => setAdjusting((v) => !v)} className="text-xs text-green-600 underline hover:text-green-800 transition-colors">
                    {adjusting ? 'Cancel' : 'Adjust'}
                  </button>
                </div>
                {!adjusting ? (
                  <ul className="space-y-1.5">
                    {result.items.map((item, i) => (
                      <li key={i} className="flex items-center justify-between text-sm">
                        <div className="flex items-center gap-2 text-gray-700">
                          <span className="w-1.5 h-1.5 rounded-full bg-green-400 shrink-0" />
                          <span>{item.name}</span>
                          <span className="text-gray-400 text-xs">({item.amount})</span>
                        </div>
                        <span className="font-semibold text-gray-800 shrink-0">{item.calories} kcal</span>
                      </li>
                    ))}
                  </ul>
                ) : (
                  <div className="space-y-2">
                    {editItems.map((item, i) => (
                      <div key={i} className="flex gap-1.5 items-center">
                        <input value={item.name} onChange={(e) => updateItem(i, 'name', e.target.value)} placeholder="Ingredient"
                          className="flex-1 min-w-0 text-sm border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                        <input value={item.amount} onChange={(e) => updateItem(i, 'amount', e.target.value)} placeholder="Amount"
                          className="w-20 text-sm border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                        <button onClick={() => removeItem(i)} className="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none px-1">×</button>
                      </div>
                    ))}
                    <div className="flex gap-1.5 items-center pt-1">
                      <input value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addItem()}
                        placeholder="+ Add ingredient" className="flex-1 min-w-0 text-sm border border-dashed border-gray-300 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                      <input value={newAmount} onChange={(e) => setNewAmount(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addItem()}
                        placeholder="Amount" className="w-20 text-sm border border-dashed border-gray-300 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                      <button onClick={addItem} className="text-green-500 hover:text-green-700 transition-colors text-xl leading-none px-1">+</button>
                    </div>
                    <button onClick={handleRecalc} disabled={recalcLoading || editItems.length === 0}
                      className="w-full py-2 rounded-xl bg-green-500 hover:bg-green-600 disabled:bg-green-300 text-white font-semibold text-sm transition-colors mt-1">
                      {recalcLoading ? 'Recalculating…' : 'Recalculate nutrition'}
                    </button>
                  </div>
                )}
              </div>
              <hr className="border-green-50" />
              <div>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Macronutrients</p>
                <div className="space-y-3">
                  <MacroBar label="Protein" value={result.macros.protein} total={total} color="bg-green-400" />
                  <MacroBar label="Carbs"   value={result.macros.carbs}   total={total} color="bg-blue-300" />
                  <MacroBar label="Fat"     value={result.macros.fat}     total={total} color="bg-yellow-300" />
                </div>
              </div>
              <hr className="border-green-50" />
              <div className="bg-green-50 rounded-xl p-3 flex gap-2">
                <span className="text-green-500 text-lg shrink-0">💡</span>
                <p className="text-sm text-green-800">{result.tip}</p>
              </div>
              <hr className="border-green-50" />
              <div>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Уточнение для ИИ</p>
                <div className="flex gap-2">
                  <input
                    value={clarifyText}
                    onChange={e => setClarifyText(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleClarify()}
                    placeholder="«двойная порция», «жареное в масле», «без соуса»…"
                    className="flex-1 min-w-0 text-sm border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-green-400 transition-colors"
                  />
                  <button
                    onClick={handleClarify}
                    disabled={!clarifyText.trim() || clarifyLoading}
                    className="px-4 py-2 rounded-xl bg-green-500 hover:bg-green-600 disabled:bg-green-200 text-white font-semibold text-sm transition-colors shrink-0"
                  >
                    {clarifyLoading ? '…' : 'Пересчитать'}
                  </button>
                </div>
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={onReset} className="flex-1 py-3 rounded-2xl border border-gray-200 bg-white hover:bg-gray-50 active:bg-gray-100 text-gray-600 font-semibold text-sm transition-colors">
                Не добавлять
              </button>
              <button onClick={onAddToLog} className="flex-1 py-3 rounded-2xl bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-semibold text-sm transition-colors shadow-sm">
                Добавить
              </button>
            </div>
          </div>
        );
      }

      /* ── UploadZone ───────────────────────────────────────────────── */
      function UploadZone({ onFile }) {
        const [dragging, setDragging] = useState(false);
        const fileRef = useRef(null);
        const cameraRef = useRef(null);
        const pick = (e) => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ''; };
        return (
          <div className="w-full max-w-md mx-auto space-y-4">
            <div
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={(e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) onFile(f); }}
              onClick={() => fileRef.current?.click()}
              className={`relative flex flex-col items-center justify-center gap-3 border-2 border-dashed rounded-2xl p-10 cursor-pointer transition-all duration-200 select-none ${
                dragging ? 'border-green-500 bg-green-50 scale-[1.02]' : 'border-green-200 bg-white hover:border-green-400 hover:bg-green-50'
              }`}
            >
              <div className="text-5xl">🥗</div>
              <div className="text-center">
                <p className="font-semibold text-gray-700">Drop your food photo here</p>
                <p className="text-sm text-gray-400 mt-1">or click to browse</p>
              </div>
              <p className="text-xs text-gray-300">PNG · JPG · WEBP · HEIC</p>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={pick} />
            </div>
            <button onClick={() => cameraRef.current?.click()}
              className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl border border-green-200 bg-white hover:bg-green-50 active:bg-green-100 text-green-700 font-semibold text-sm transition-colors">
              <span className="text-lg">📷</span> Take a Photo
            </button>
            <input ref={cameraRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={pick} />
          </div>
        );
      }

      /* ── App ──────────────────────────────────────────────────────── */
      function App() {
        const [auth,        setAuth]        = useState(() => loadAuth());
        const [state,       setState]       = useState('idle');
        const [result,      setResult]      = useState(null);
        const [imageUrl,    setImageUrl]    = useState('');
        const [errorMsg,    setErrorMsg]    = useState('');
        const [dailyLog,    setDailyLog]    = useState(() => loadDailyLog());
        const [advice,      setAdvice]      = useState(null);
        const [analyzing,   setAnalyzing]   = useState(false);

        function handleLogin(user) { saveAuth(user); setAuth(user); }
        function handleLogout() { clearAuth(); setAuth(null); setState('idle'); setResult(null); setImageUrl(''); setErrorMsg(''); setAdvice(null); }

        const handleAnalyzeDay = useCallback(async () => {
          setAnalyzing(true);
          setAdvice(null);
          try {
            const data = await getDailyAdvice(dailyLog.meals);
            setAdvice(data);
          } catch (err) {
            setErrorMsg(err.message || 'Не удалось получить анализ.');
          } finally {
            setAnalyzing(false);
          }
        }, [dailyLog.meals]);

        if (!auth) return <LoginScreen onLogin={handleLogin} />;

        const handleFile = useCallback(async (file) => {
          if (!file.type.startsWith('image/')) { setErrorMsg('Please upload an image file.'); setState('error'); return; }
          setImageUrl(URL.createObjectURL(file));
          setState('loading');
          try {
            const data = await analyzeImage(file);
            setResult(data);
            setState('result');
          } catch (err) {
            setErrorMsg(err.message || 'Something went wrong.');
            setState('error');
          }
        }, []);

        const handleRecalculate = useCallback(async (items, dish) => {
          setState('loading');
          try {
            const data = await recalculateFromIngredients(items, dish);
            setResult(data);
            setState('result');
          } catch (err) {
            setErrorMsg(err.message || 'Something went wrong.');
            setState('error');
          }
        }, []);

        const handleClearDay = useCallback(() => {
          const fresh = { date: todayStr(), meals: [] };
          saveDailyLog(fresh); setDailyLog(fresh);
        }, []);

        const reset = useCallback(() => { setResult(null); setImageUrl(''); setErrorMsg(''); setState('idle'); }, []);

        const handleClarify = useCallback(async (currentResult, clarification) => {
          setState('loading');
          try {
            const data = await clarifyResult(currentResult, clarification);
            setResult(data);
            setState('result');
          } catch (err) {
            setErrorMsg(err.message || 'Something went wrong.');
            setState('error');
          }
        }, []);

        const handleAddToLog = useCallback(() => {
          if (!result) return;
          setDailyLog((prev) => {
            const updated = { ...prev, meals: [...prev.meals, {
              id: Date.now().toString(), dish: result.dish, calories: result.totalCalories,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            }]};
            saveDailyLog(updated);
            return updated;
          });
          reset();
        }, [result, reset]);

        return (
          <div className="min-h-screen py-8 px-4">
            <div className="relative text-center mb-8">
              <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">FoodScan</h1>
              <p className="text-gray-400 mt-1 text-sm">AI-powered food & calorie analyzer</p>
              <div className="absolute top-0 right-0 flex items-center gap-2">
                <span className="text-xs text-gray-500 font-medium hidden sm:inline">{auth.label}</span>
                <button onClick={() => { if (window.confirm('Выйти из аккаунта?')) handleLogout(); }}
                  title="Выйти"
                  className="flex items-center gap-1 px-3 h-8 rounded-full bg-green-100 hover:bg-red-100 text-green-700 hover:text-red-600 text-xs font-semibold transition-colors">
                  ↩ Выход
                </button>
              </div>
            </div>

            <DailyCounter log={dailyLog} onClear={handleClearDay} onAnalyze={handleAnalyzeDay} analyzing={analyzing} />

            {advice && <DailyAdviceCard advice={advice} onClose={() => setAdvice(null)} />}

            {state === 'idle' && <UploadZone onFile={handleFile} />}

            {state === 'loading' && (
              <div className="w-full max-w-md mx-auto space-y-4">
                {imageUrl && <div className="rounded-2xl overflow-hidden shadow-md"><img src={imageUrl} className="w-full object-cover max-h-56" /></div>}
                <div className="bg-white rounded-2xl border border-green-100 shadow-sm p-6">
                  <p className="text-center text-sm text-green-600 font-medium mb-4">Analyzing your food…</p>
                  <Skeleton />
                </div>
              </div>
            )}

            {state === 'result' && result && <ResultCard result={result} imageUrl={imageUrl} onReset={reset} onRecalculate={handleRecalculate} onAddToLog={handleAddToLog} onClarify={handleClarify} />}

            {state === 'error' && (
              <div className="w-full max-w-md mx-auto space-y-4">
                <div className="bg-red-50 border border-red-200 rounded-2xl p-5 text-center">
                  <div className="text-3xl mb-2">⚠️</div>
                  <p className="text-red-700 font-semibold">Analysis Failed</p>
                  <p className="text-red-500 text-sm mt-2">{errorMsg}</p>
                </div>
                <button onClick={reset} className="w-full py-3 rounded-2xl bg-green-500 hover:bg-green-600 text-white font-semibold text-sm transition-colors">Try Again</button>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
