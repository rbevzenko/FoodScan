<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodScan — Calorie Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, #f0fdf4 25%, #dcfce7 50%, #f0fdf4 75%);
        background-size: 800px 100%;
        animation: shimmer 1.4s infinite;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-green-50 via-white to-emerald-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      async function analyzeImage(file) {
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ image_base64: base64, media_type: file.type || 'image/jpeg' }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      async function recalculateFromIngredients(items, dish) {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ ingredients: items, dish }),
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
      }

      /* ── Daily log helpers ────────────────────────────────────────── */
      const DAILY_GOAL = 1500;
      const STORAGE_KEY = 'foodscan_daily_log';

      function todayStr() { return new Date().toISOString().slice(0, 10); }

      function loadDailyLog() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) { const p = JSON.parse(raw); if (p.date === todayStr()) return p; }
        } catch {}
        return { date: todayStr(), meals: [] };
      }

      function saveDailyLog(log) { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); }

      /* ── DailyCounter ─────────────────────────────────────────────── */
      function DailyCounter({ log, onClear }) {
        const total = log.meals.reduce((sum, m) => sum + m.calories, 0);
        const pct = Math.min(100, (total / DAILY_GOAL) * 100);
        const over = total > DAILY_GOAL;
        return (
          <div className="w-full max-w-md mx-auto mb-6 bg-white rounded-2xl shadow-sm border border-green-100 p-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm font-semibold text-gray-600">Today's calories</span>
              <button onClick={onClear} className="text-xs text-gray-500 underline hover:text-red-500 transition-colors">Reset day</button>
            </div>
            <div className="flex items-end gap-1 mb-2">
              <span className={`text-3xl font-extrabold leading-none ${over ? 'text-red-500' : 'text-green-600'}`}>{total}</span>
              <span className="text-gray-400 text-sm mb-0.5">/ {DAILY_GOAL} kcal</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2 mb-3">
              <div className={`h-2 rounded-full transition-all duration-700 ${over ? 'bg-red-400' : 'bg-green-400'}`} style={{ width: `${pct}%` }} />
            </div>
            {log.meals.length > 0 ? (
              <ul className="space-y-1">
                {log.meals.map((m) => (
                  <li key={m.id} className="flex justify-between text-xs text-gray-500">
                    <span className="truncate mr-2">{m.dish}</span>
                    <span className="shrink-0 font-medium text-gray-700">{m.calories} kcal · {m.time}</span>
                  </li>
                ))}
              </ul>
            ) : (
              <p className="text-xs text-gray-400 text-center">No meals logged yet today</p>
            )}
          </div>
        );
      }

      /* ── Skeleton ─────────────────────────────────────────────────── */
      function Skeleton() {
        return (
          <div className="space-y-3 w-full">
            {[['2/3 mx-auto h-6'],['full h-4'],['5/6 h-4'],['4/6 h-4'],['full h-3'],['full h-3'],['full h-3'],['full h-10']].map(([cls], i) => (
              <div key={i} className={`shimmer rounded-xl w-${cls}`} />
            ))}
          </div>
        );
      }

      function ConfidenceBadge({ level }) {
        const style = { low: 'bg-red-100 text-red-700', medium: 'bg-yellow-100 text-yellow-700', high: 'bg-green-100 text-green-700' }[level] ?? 'bg-gray-100 text-gray-600';
        return <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide ${style}`}>{level} confidence</span>;
      }

      function MacroBar({ label, value, total, color }) {
        const pct = total > 0 ? Math.min(100, (value / total) * 100) : 0;
        return (
          <div>
            <div className="flex justify-between text-sm mb-1">
              <span className="font-medium text-gray-500">{label}</span>
              <span className="font-semibold text-gray-800">{value}g</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2.5">
              <div className={`${color} h-2.5 rounded-full transition-all duration-700`} style={{ width: `${pct}%` }} />
            </div>
          </div>
        );
      }

      /* ── ResultCard ───────────────────────────────────────────────── */
      function ResultCard({ result, imageUrl, onReset, onRecalculate }) {
        const total = result.macros.protein + result.macros.carbs + result.macros.fat;
        const [adjusting, setAdjusting] = useState(false);
        const [editItems, setEditItems] = useState(result.items);
        const [newName, setNewName] = useState('');
        const [newAmount, setNewAmount] = useState('');
        const [recalcLoading, setRecalcLoading] = useState(false);

        useEffect(() => { setEditItems(result.items); setAdjusting(false); }, [result]);

        function updateItem(i, field, value) {
          setEditItems((prev) => prev.map((item, idx) => idx === i ? { ...item, [field]: value } : item));
        }
        function removeItem(i) { setEditItems((prev) => prev.filter((_, idx) => idx !== i)); }
        function addItem() {
          if (!newName.trim()) return;
          setEditItems((prev) => [...prev, { name: newName.trim(), amount: newAmount.trim() || '1 serving', calories: 0 }]);
          setNewName(''); setNewAmount('');
        }
        async function handleRecalc() {
          setRecalcLoading(true);
          try { await onRecalculate(editItems, result.dish); }
          finally { setRecalcLoading(false); }
        }

        return (
          <div className="w-full max-w-md mx-auto space-y-4 pb-10">
            <div className="rounded-2xl overflow-hidden shadow-md">
              <img src={imageUrl} alt="food" className="w-full object-cover max-h-56" />
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-green-100 p-5 space-y-4">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <h2 className="text-xl font-bold text-gray-800">{result.dish}</h2>
                  <div className="mt-1"><ConfidenceBadge level={result.confidence} /></div>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-4xl font-extrabold text-green-600 leading-none">{result.totalCalories}</div>
                  <div className="text-xs text-gray-400 mt-0.5">kcal</div>
                </div>
              </div>
              <hr className="border-green-50" />
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest">Ingredients</p>
                  <button onClick={() => setAdjusting((v) => !v)} className="text-xs text-green-600 underline hover:text-green-800 transition-colors">
                    {adjusting ? 'Cancel' : 'Adjust'}
                  </button>
                </div>
                {!adjusting ? (
                  <ul className="space-y-1.5">
                    {result.items.map((item, i) => (
                      <li key={i} className="flex items-center justify-between text-sm">
                        <div className="flex items-center gap-2 text-gray-700">
                          <span className="w-1.5 h-1.5 rounded-full bg-green-400 shrink-0" />
                          <span>{item.name}</span>
                          <span className="text-gray-400 text-xs">({item.amount})</span>
                        </div>
                        <span className="font-semibold text-gray-800 shrink-0">{item.calories} kcal</span>
                      </li>
                    ))}
                  </ul>
                ) : (
                  <div className="space-y-2">
                    {editItems.map((item, i) => (
                      <div key={i} className="flex gap-1.5 items-center">
                        <input value={item.name} onChange={(e) => updateItem(i, 'name', e.target.value)} placeholder="Ingredient"
                          className="flex-1 min-w-0 text-sm border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                        <input value={item.amount} onChange={(e) => updateItem(i, 'amount', e.target.value)} placeholder="Amount"
                          className="w-20 text-sm border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                        <button onClick={() => removeItem(i)} className="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none px-1">×</button>
                      </div>
                    ))}
                    <div className="flex gap-1.5 items-center pt-1">
                      <input value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addItem()}
                        placeholder="+ Add ingredient" className="flex-1 min-w-0 text-sm border border-dashed border-gray-300 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                      <input value={newAmount} onChange={(e) => setNewAmount(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addItem()}
                        placeholder="Amount" className="w-20 text-sm border border-dashed border-gray-300 rounded-lg px-2 py-1.5 outline-none focus:border-green-400" />
                      <button onClick={addItem} className="text-green-500 hover:text-green-700 transition-colors text-xl leading-none px-1">+</button>
                    </div>
                    <button onClick={handleRecalc} disabled={recalcLoading || editItems.length === 0}
                      className="w-full py-2 rounded-xl bg-green-500 hover:bg-green-600 disabled:bg-green-300 text-white font-semibold text-sm transition-colors mt-1">
                      {recalcLoading ? 'Recalculating…' : 'Recalculate nutrition'}
                    </button>
                  </div>
                )}
              </div>
              <hr className="border-green-50" />
              <div>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Macronutrients</p>
                <div className="space-y-3">
                  <MacroBar label="Protein" value={result.macros.protein} total={total} color="bg-green-400" />
                  <MacroBar label="Carbs"   value={result.macros.carbs}   total={total} color="bg-blue-300" />
                  <MacroBar label="Fat"     value={result.macros.fat}     total={total} color="bg-yellow-300" />
                </div>
              </div>
              <hr className="border-green-50" />
              <div className="bg-green-50 rounded-xl p-3 flex gap-2">
                <span className="text-green-500 text-lg shrink-0">💡</span>
                <p className="text-sm text-green-800">{result.tip}</p>
              </div>
            </div>
            <button onClick={onReset} className="w-full py-3 rounded-2xl bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-semibold text-sm transition-colors shadow-sm">
              Analyze Another
            </button>
          </div>
        );
      }

      /* ── UploadZone ───────────────────────────────────────────────── */
      function UploadZone({ onFile }) {
        const [dragging, setDragging] = useState(false);
        const fileRef = useRef(null);
        const cameraRef = useRef(null);
        const pick = (e) => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ''; };
        return (
          <div className="w-full max-w-md mx-auto space-y-4">
            <div
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={(e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) onFile(f); }}
              onClick={() => fileRef.current?.click()}
              className={`relative flex flex-col items-center justify-center gap-3 border-2 border-dashed rounded-2xl p-10 cursor-pointer transition-all duration-200 select-none ${
                dragging ? 'border-green-500 bg-green-50 scale-[1.02]' : 'border-green-200 bg-white hover:border-green-400 hover:bg-green-50'
              }`}
            >
              <div className="text-5xl">🥗</div>
              <div className="text-center">
                <p className="font-semibold text-gray-700">Drop your food photo here</p>
                <p className="text-sm text-gray-400 mt-1">or click to browse</p>
              </div>
              <p className="text-xs text-gray-300">PNG · JPG · WEBP · HEIC</p>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={pick} />
            </div>
            <button onClick={() => cameraRef.current?.click()}
              className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl border border-green-200 bg-white hover:bg-green-50 active:bg-green-100 text-green-700 font-semibold text-sm transition-colors">
              <span className="text-lg">📷</span> Take a Photo
            </button>
            <input ref={cameraRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={pick} />
          </div>
        );
      }

      /* ── App ──────────────────────────────────────────────────────── */
      function App() {
        const [state,    setState]    = useState('idle');
        const [result,   setResult]   = useState(null);
        const [imageUrl, setImageUrl] = useState('');
        const [errorMsg, setErrorMsg] = useState('');
        const [dailyLog, setDailyLog] = useState(() => loadDailyLog());

        const handleFile = useCallback(async (file) => {
          if (!file.type.startsWith('image/')) { setErrorMsg('Please upload an image file.'); setState('error'); return; }
          setImageUrl(URL.createObjectURL(file));
          setState('loading');
          try {
            const data = await analyzeImage(file);
            setResult(data);
            setState('result');
            setDailyLog((prev) => {
              const updated = { ...prev, meals: [...prev.meals, {
                id: Date.now().toString(), dish: data.dish, calories: data.totalCalories,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              }]};
              saveDailyLog(updated);
              return updated;
            });
          } catch (err) {
            setErrorMsg(err.message || 'Something went wrong.');
            setState('error');
          }
        }, []);

        const handleRecalculate = useCallback(async (items, dish) => {
          setState('loading');
          try {
            const data = await recalculateFromIngredients(items, dish);
            setResult(data);
            setState('result');
            setDailyLog((prev) => {
              const meals = [...prev.meals];
              if (meals.length > 0) meals[meals.length - 1] = { ...meals[meals.length - 1], dish: data.dish, calories: data.totalCalories };
              const updated = { ...prev, meals };
              saveDailyLog(updated);
              return updated;
            });
          } catch (err) {
            setErrorMsg(err.message || 'Something went wrong.');
            setState('error');
          }
        }, []);

        const handleClearDay = useCallback(() => {
          const fresh = { date: todayStr(), meals: [] };
          saveDailyLog(fresh); setDailyLog(fresh);
        }, []);

        const reset = useCallback(() => { setResult(null); setImageUrl(''); setErrorMsg(''); setState('idle'); }, []);

        return (
          <div className="min-h-screen py-8 px-4">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">FoodScan</h1>
              <p className="text-gray-400 mt-1 text-sm">AI-powered food & calorie analyzer</p>
            </div>

            <DailyCounter log={dailyLog} onClear={handleClearDay} />

            {state === 'idle' && <UploadZone onFile={handleFile} />}

            {state === 'loading' && (
              <div className="w-full max-w-md mx-auto space-y-4">
                {imageUrl && <div className="rounded-2xl overflow-hidden shadow-md"><img src={imageUrl} className="w-full object-cover max-h-56" /></div>}
                <div className="bg-white rounded-2xl border border-green-100 shadow-sm p-6">
                  <p className="text-center text-sm text-green-600 font-medium mb-4">Analyzing your food…</p>
                  <Skeleton />
                </div>
              </div>
            )}

            {state === 'result' && result && <ResultCard result={result} imageUrl={imageUrl} onReset={reset} onRecalculate={handleRecalculate} />}

            {state === 'error' && (
              <div className="w-full max-w-md mx-auto space-y-4">
                <div className="bg-red-50 border border-red-200 rounded-2xl p-5 text-center">
                  <div className="text-3xl mb-2">⚠️</div>
                  <p className="text-red-700 font-semibold">Analysis Failed</p>
                  <p className="text-red-500 text-sm mt-2">{errorMsg}</p>
                </div>
                <button onClick={reset} className="w-full py-3 rounded-2xl bg-green-500 hover:bg-green-600 text-white font-semibold text-sm transition-colors">Try Again</button>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
